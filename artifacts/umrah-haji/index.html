<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>Memuat...</title>
    <meta name="description" content="Sistem Manajemen Umrah & Haji" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vinstour" />
    <meta name="theme-color" content="#16a34a" />

    <!-- PWA Manifest (dynamic — served from Supabase Edge Function with live settings) (GAP-PWA-01) -->
    <link rel="manifest" id="pwa-manifest" href="https://ribjppjnjigiowhjgngu.supabase.co/functions/v1/manifest" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- Open Graph (Akan diupdate secara dinamis oleh ThemeProvider) -->
    <meta property="og:type" content="website" />

    <!-- Font Preconnect & Async Load (non-blocking First Paint) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"></noscript>

    <!-- Twitter (Akan diupdate secara dinamis oleh ThemeProvider) -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- 
      SEO & THEME RESTORATION SCRIPT
      Menerapkan tema dan meta tag SEO yang disimpan dari sesi sebelumnya sebelum React merender.
      Ini memastikan Google Search Console dapat memverifikasi situs meskipun ini adalah aplikasi Client-Side Rendering (SPA).
    -->
    <script>
      (function() {
        try {
          // Restore Theme
          const cachedTheme = localStorage.getItem('website-theme-cache');
          if (cachedTheme) {
            const cssVars = JSON.parse(cachedTheme);
            const root = document.documentElement;
            Object.keys(cssVars).forEach(key => {
              root.style.setProperty(key, cssVars[key]);
            });
          }

          // CSS-FIX-2: Restore fonts from localStorage BEFORE React mounts
          // to eliminate the visible font swap on subsequent loads.
          const cachedFonts = localStorage.getItem('website-fonts-cache');
          if (cachedFonts) {
            const { heading, body } = JSON.parse(cachedFonts);
            const root = document.documentElement;
            if (heading) root.style.setProperty('--font-display', '"' + heading + '", sans-serif');
            if (body) root.style.setProperty('--font-sans', '"' + body + '", sans-serif');

            // Inject Google Fonts <link> for the cached pair so the font is fetched
            // in parallel with React bootstrap, not after it mounts.
            const PRELOADED = new Set(['Inter', 'Plus Jakarta Sans']);
            const custom = [heading, body].filter(Boolean).filter(f => !PRELOADED.has(f));
            const unique = Array.from(new Set(custom));
            if (unique.length > 0 && !document.getElementById('dynamic-google-fonts')) {
              const families = unique.map(f => f.replace(/\s+/g, '+')).join('&family=');
              const link = document.createElement('link');
              link.id = 'dynamic-google-fonts';
              link.rel = 'stylesheet';
              link.href = 'https://fonts.googleapis.com/css2?family=' + families + ':wght@400;500;600;700&display=swap';
              document.head.appendChild(link);
            }
          }

          // Restore Google Search Console Verification
          const cachedVerification = localStorage.getItem('website-seo-verification');
          if (cachedVerification) {
            let meta = document.querySelector('meta[name="google-site-verification"]');
            if (!meta) {
              meta = document.createElement('meta');
              meta.setAttribute('name', 'google-site-verification');
              document.head.appendChild(meta);
            }
            meta.setAttribute('content', cachedVerification);
          }
        } catch (e) {
          console.warn('Restoration failed:', e);
        }
      })();
    </script>

    <!-- 
      INITIAL LOADER STYLES
      Gaya untuk animasi loading yang ditampilkan sambil aplikasi sedang di-mount.
      Ini memberikan umpan balik visual kepada pengguna bahwa aplikasi sedang berjalan.
    -->
    <style>
      /* Prevent layout shift during initial load */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      /* Lock scroll only during initial loading */
      body.loading-state {
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      /* Initial Loader Container */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, hsl(160, 30%, 8%) 0%, hsl(160, 40%, 15%) 100%);
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.3s ease-out;
      }

      .initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Spinner Animation */
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid hsl(160, 30%, 25%);
        border-top-color: hsl(160, 84%, 25%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Loading Text */
      .loader-text {
        position: absolute;
        bottom: 30px;
        color: hsl(60, 20%, 95%);
        font-size: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        letter-spacing: 2px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      /* Font fallback stack for body and display fonts */
      body {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
        --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body class="loading-state">
    <!-- Initial Loader - akan dihapus setelah React siap -->
    <div class="initial-loader" id="initialLoader">
      <div>
        <img id="initialLoaderLogo" alt="" style="display:none;width:64px;height:64px;border-radius:14px;margin:0 auto 14px;object-fit:cover;box-shadow:0 6px 18px rgba(0,0,0,.25)" />
        <div class="spinner"></div>
        <div class="loader-text" id="initialLoaderText">MEMUAT</div>
      </div>
    </div>

    <!-- Dynamic Splash: apply tenant brand from previous session before React paints -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('tenant-brand');
          if (!raw) return;
          var brand = JSON.parse(raw);
          var loader = document.getElementById('initialLoader');
          if (loader && brand.gradient) {
            loader.style.background = brand.gradient;
          } else if (loader && brand.color) {
            loader.style.background = 'linear-gradient(135deg, ' + brand.color + ' 0%, #0b0b0b 100%)';
          }
          if (brand.logo) {
            var img = document.getElementById('initialLoaderLogo');
            if (img) { img.src = brand.logo; img.style.display = 'block'; }
          }
          if (brand.name) {
            var t = document.getElementById('initialLoaderText');
            if (t) t.textContent = brand.name.toUpperCase();
          }
        } catch (e) { /* ignore */ }
      })();
    </script>

    <!-- React Root Element -->
    <div id="root"></div>

    <!-- Main Application Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
