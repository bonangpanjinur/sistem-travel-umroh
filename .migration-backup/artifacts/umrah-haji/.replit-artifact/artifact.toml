kind = "web"
previewPath = "/"
title = "Umrah Haji - Portal Jamaah"
version = "1.0.0"
id = "artifacts/umrah-haji"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18793

[services.development]
run = "pnpm --filter @workspace/umrah-haji run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/umrah-haji", "run", "build" ]
publicDir = "artifacts/umrah-haji/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18793"
BASE_PATH = "/"
