    <!-- 
      THEME RESTORATION SCRIPT
      Menerapkan tema yang disimpan dari sesi sebelumnya sebelum React merender.
      Ini mencegah "Flash of Unstyled Content (FOUC)" dengan mengembalikan variabel CSS tema
      dari localStorage sebelum browser mulai merender elemen body.
    -->
    <script>
      (function() {
        try {
          const cachedTheme = localStorage.getItem('website-theme-cache');
          if (cachedTheme) {
            const cssVars = JSON.parse(cachedTheme);
            const root = document.documentElement;
            Object.keys(cssVars).forEach(key => {
              root.style.setProperty(key, cssVars[key]);
            });
          }
        } catch (e) {
          // Abaikan jika ada error parsing atau localStorage tidak tersedia
          console.warn('Theme restoration failed:', e);
        }
      })();
    </script>

    <!-- 
      INITIAL LOADER STYLES
      Gaya untuk animasi loading yang ditampilkan sambil aplikasi sedang di-mount.
      Ini memberikan umpan balik visual kepada pengguna bahwa aplikasi sedang berjalan.
    -->
    <style>
      /* Prevent layout shift during initial load */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      /* Initial Loader Container */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, hsl(160, 30%, 8%) 0%, hsl(160, 40%, 15%) 100%);
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.3s ease-out;
      }

      .initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Spinner Animation */
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid hsl(160, 30%, 25%);
        border-top-color: hsl(160, 84%, 25%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Loading Text */
      .loader-text {
        position: absolute;
        bottom: 30px;
        color: hsl(60, 20%, 95%);
        font-size: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        letter-spacing: 2px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      /* Font fallback stack for body and display fonts */
      body {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
        --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <!-- Initial Loader - akan dihapus setelah React siap -->
    <div class="initial-loader" id="initialLoader">
      <div>
        <div class="spinner"></div>
        <div class="loader-text">MEMUAT</div>
      </div>
    </div>

    <!-- React Root Element -->
    <div id="root"></div>

    <!-- Main Application Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
